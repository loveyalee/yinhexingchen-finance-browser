<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 银河星辰管理后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f4f7fb; color: #223548; }
    .page { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .title h1 { font-size: 28px; margin-bottom: 6px; }
    .title p { color: #6a7b8d; font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 700; }
    .btn-primary { background: #2d8cf0; color: #fff; }
    .btn-light { background: #fff; color: #2d4b68; border: 1px solid #d8e4f0; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-success { background: #52c41a; color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 18px; }
    .card { background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 8px 22px rgba(26, 57, 92, 0.08); }
    .stat-label { color: #6c8196; font-size: 13px; margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 800; color: #17324b; }
    .notice { background: #eef7ff; color: #24507a; border: 1px solid #cfe3f7; border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; }
    .filters { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 6px; color: #64809c; font-size: 13px; }
    .field input, .field select { width: 100%; padding: 11px 12px; border: 1px solid #d8e4f0; border-radius: 10px; outline: none; background: #fff; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #e8eef5; text-align: left; font-size: 14px; }
    th { color: #58708a; background: #f8fbfe; font-weight: 700; }
    tr:hover td { background: #f9fcff; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-ok { background: #def7e8; color: #167a45; }
    .badge-partial { background: #fff3d9; color: #996600; }
    .badge-banned { background: #ffeaea; color: #cf1322; }
    .badge-normal { background: #e8f9e8; color: #167a45; }
    .empty { padding: 26px; text-align: center; color: #6c8196; }
    .subtle { color: #6c8196; font-size: 13px; margin-top: 6px; }
    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 20px; margin-bottom: 20px; }
    .modal-field { margin-bottom: 16px; }
    .modal-field label { display: block; margin-bottom: 8px; color: #64809c; font-size: 13px; }
    .modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 11px 12px; border: 1px solid #d8e4f0; border-radius: 10px; outline: none; background: #fff; font-size: 14px; }
    .modal-field textarea { resize: vertical; min-height: 80px; }
    .modal-field .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-field .radio-item { padding: 8px 14px; border: 1px solid #d8e4f0; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .modal-field .radio-item.selected { background: #e6f4ff; border-color: #2d8cf0; color: #2d8cf0; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #999; }
    .detail-value { font-weight: 600; }
    @media (max-width: 900px) {
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">
        <h1>用户管理</h1>
        <p>查看平台注册用户数量、类型、今日新增与同步状态</p>
      </div>
      <div class="actions">
        <button class="btn btn-light" onclick="window.location.href='admin.html'">返回后台</button>
        <button class="btn btn-primary" onclick="loadUsers()">刷新数据</button>
      </div>
    </div>

    <div class="notice" id="notice">正在加载注册用户数据...</div>

    <div class="stats">
      <div class="card">
        <div class="stat-label">注册用户总数</div>
        <div class="stat-value" id="totalUsers">--</div>
      </div>
      <div class="card">
        <div class="stat-label">今日新增</div>
        <div class="stat-value" id="todayUsers">--</div>
      </div>
      <div class="card">
        <div class="stat-label">个人用户</div>
        <div class="stat-value" id="personalUsers">--</div>
      </div>
      <div class="card">
        <div class="stat-label">机构用户</div>
        <div class="stat-value" id="institutionUsers">--</div>
      </div>
      <div class="card">
        <div class="stat-label">被封锁用户</div>
        <div class="stat-value" id="bannedUsers">--</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <div class="filters">
        <div class="field">
          <label for="searchKeyword">搜索手机号 / 机构名称</label>
          <input id="searchKeyword" type="text" placeholder="输入手机号或机构名称关键词">
        </div>
        <div class="field">
          <label for="userTypeFilter">用户类型</label>
          <select id="userTypeFilter">
            <option value="all">全部类型</option>
            <option value="personal">个人用户</option>
            <option value="institution">机构用户</option>
          </select>
        </div>
        <div class="field">
          <label for="statusFilter">用户状态</label>
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="normal">正常</option>
            <option value="banned">已封锁</option>
          </select>
        </div>
        <div class="field">
          <label for="syncFilter">同步状态</label>
          <select id="syncFilter">
            <option value="all">全部状态</option>
            <option value="synced">已同步</option>
            <option value="partial">部分同步</option>
            <option value="unsynced">未同步</option>
          </select>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="applyFilters()">筛选</button>
          <button class="btn btn-light" onclick="resetFilters()">重置</button>
        </div>
      </div>
      <div class="subtle" id="filterSummary">当前显示全部用户</div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户ID</th>
              <th>手机号</th>
              <th>用户类型</th>
              <th>机构类型</th>
              <th>机构名称</th>
              <th>用户状态</th>
              <th>同步状态</th>
              <th>注册时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td class="empty" colspan="9">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="banModal">
    <div class="modal">
      <h2>封锁用户</h2>
      <div class="modal-field">
        <label>封锁原因（可选择或手动输入）</label>
        <div class="radio-group" id="reasonOptions">
          <div class="radio-item" data-value="发布色情内容">发布色情内容</div>
          <div class="radio-item" data-value="赌博">赌博</div>
          <div class="radio-item" data-value="违规广告">违规广告</div>
          <div class="radio-item" data-value="诈骗">诈骗</div>
          <div class="radio-item" data-value="恶意骚扰">恶意骚扰</div>
          <div class="radio-item" data-value="违规发布">违规发布</div>
        </div>
        <input type="text" id="banReason" placeholder="或手动输入其他原因" style="margin-top:10px;">
      </div>
      <div class="modal-field">
        <label>封锁时长</label>
        <select id="banDuration">
          <option value="1">1天</option>
          <option value="3">3天</option>
          <option value="5">5天</option>
          <option value="15">15天</option>
          <option value="30">30天</option>
          <option value="90">90天</option>
          <option value="180">180天</option>
          <option value="365">1年</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-light" onclick="closeBanModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmBan()">确定封锁</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h2>封锁详情</h2>
      <div id="banDetailContent"></div>
      <div class="modal-actions">
        <button class="btn btn-light" onclick="closeDetailModal()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    let allUsers = [];
    let currentBanUserId = null;

    function formatTime(value) {
      if (!value) return '--';
      try {
        return new Date(value).toLocaleString('zh-CN');
      } catch (e) {
        return value;
      }
    }

    function formatDate(value) {
      if (!value) return '--';
      try {
        return new Date(value).toLocaleDateString('zh-CN');
      } catch (e) {
        return value;
      }
    }

    function isToday(value) {
      if (!value) return false;
      const date = new Date(value);
      const now = new Date();
      return date.getFullYear() === now.getFullYear() &&
        date.getMonth() === now.getMonth() &&
        date.getDate() === now.getDate();
    }

    function updateStats(users) {
      document.getElementById('totalUsers').textContent = allUsers.length;
      document.getElementById('todayUsers').textContent = allUsers.filter(function(user) { return isToday(user.create_time); }).length;
      document.getElementById('personalUsers').textContent = allUsers.filter(function(user) { return user.user_type !== 'institution'; }).length;
      document.getElementById('institutionUsers').textContent = allUsers.filter(function(user) { return user.user_type === 'institution'; }).length;
      document.getElementById('bannedUsers').textContent = allUsers.filter(function(user) { return user.ban_status === 'banned'; }).length;
      document.getElementById('filterSummary').textContent = '当前筛选后显示 ' + users.length + ' 个用户';
    }

    function renderUsers(users) {
      const body = document.getElementById('userTableBody');
      if (!Array.isArray(users) || !users.length) {
        body.innerHTML = '<tr><td class="empty" colspan="9">暂无符合条件的用户</td></tr>';
        return;
      }
      body.innerHTML = users.map(function(user) {
        const isInstitution = user.user_type === 'institution';
        const syncOk = user.sync_status === 'synced';
        const isBanned = user.ban_status === 'banned';
        return '<tr>' +
          '<td>' + (user.id || '--') + '</td>' +
          '<td>' + (user.phone || '--') + '</td>' +
          '<td>' + (isInstitution ? '机构用户' : '个人用户') + '</td>' +
          '<td>' + (user.institution_type || '--') + '</td>' +
          '<td>' + (user.institution_name || '--') + '</td>' +
          '<td><span class="badge ' + (isBanned ? 'badge-banned' : 'badge-normal') + '">' + (isBanned ? '已封锁' : '正常') + '</span></td>' +
          '<td><span class="badge ' + (syncOk ? 'badge-ok' : 'badge-partial') + '">' + (syncOk ? '已同步' : (user.sync_status || '未同步')) + '</span></td>' +
          '<td>' + formatTime(user.create_time) + '</td>' +
          '<td><div class="action-btns">' +
            (isBanned 
              ? '<button class="btn btn-success btn-sm" onclick="unbanUser(\'' + user.id + '\')">解封</button>' + 
                '<button class="btn btn-light btn-sm" onclick="showBanDetail(\'' + user.id + '\')">详情</button>'
              : '<button class="btn btn-danger btn-sm" onclick="openBanModal(\'' + user.id + '\')">封锁</button>'
            ) +
          '</div></td>' +
        '</tr>';
      }).join('');
    }

    function applyFilters() {
      const keyword = document.getElementById('searchKeyword').value.trim();
      const userType = document.getElementById('userTypeFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const syncStatus = document.getElementById('syncFilter').value;
      const filtered = allUsers.filter(function(user) {
        const keywordMatch = !keyword || (user.phone || '').includes(keyword) || (user.institution_name || '').includes(keyword);
        const typeMatch = userType === 'all' || user.user_type === userType || (userType === 'personal' && user.user_type !== 'institution');
        const statusMatch = statusFilter === 'all' || (user.ban_status || 'normal') === statusFilter;
        const syncMatch = syncStatus === 'all' || (user.sync_status || 'unsynced') === syncStatus;
        return keywordMatch && typeMatch && statusMatch && syncMatch;
      });
      updateStats(filtered);
      renderUsers(filtered);
    }

    function resetFilters() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('userTypeFilter').value = 'all';
      document.getElementById('statusFilter').value = 'all';
      document.getElementById('syncFilter').value = 'all';
      updateStats(allUsers);
      renderUsers(allUsers);
    }

    function openBanModal(userId) {
      currentBanUserId = userId;
      document.getElementById('banReason').value = '';
      document.querySelectorAll('#reasonOptions .radio-item').forEach(function(el) {
        el.classList.remove('selected');
      });
      document.getElementById('banModal').classList.add('active');
    }

    function closeBanModal() {
      document.getElementById('banModal').classList.remove('active');
      currentBanUserId = null;
    }

    function confirmBan() {
      const reasonInput = document.getElementById('banReason').value.trim();
      const selectedReason = document.querySelector('#reasonOptions .radio-item.selected');
      const reason = reasonInput || (selectedReason ? selectedReason.dataset.value : '');
      const duration = document.getElementById('banDuration').value;

      if (!reason) {
        alert('请选择或输入封锁原因');
        return;
      }

      fetch('/api/admin/users/ban', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: currentBanUserId,
          reason: reason,
          duration: parseInt(duration)
        })
      }).then(function(resp) { return resp.json(); }).then(function(result) {
        if (result.success) {
          alert('用户已被封锁');
          closeBanModal();
          loadUsers();
        } else {
          alert(result.message || '操作失败');
        }
      }).catch(function(err) {
        alert('操作失败: ' + err.message);
      });
    }

    function unbanUser(userId) {
      if (!confirm('确定要解除该用户的封锁状态吗？')) return;
      fetch('/api/admin/users/unban', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: userId })
      }).then(function(resp) { return resp.json(); }).then(function(result) {
        if (result.success) {
          alert('用户已解除封锁');
          loadUsers();
        } else {
          alert(result.message || '操作失败');
        }
      }).catch(function(err) {
        alert('操作失败: ' + err.message);
      });
    }

    function showBanDetail(userId) {
      const user = allUsers.find(function(u) { return u.id === userId; });
      if (!user) return;
      
      const content = document.getElementById('banDetailContent');
      content.innerHTML = 
        '<div class="detail-row"><span class="detail-label">用户ID</span><span class="detail-value">' + (user.id || '--') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">手机号</span><span class="detail-value">' + (user.phone || '--') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">封锁原因</span><span class="detail-value">' + (user.ban_reason || '--') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">封锁开始</span><span class="detail-value">' + formatTime(user.ban_start_time) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">封锁结束</span><span class="detail-value">' + formatTime(user.ban_end_time) + '</span></div>';
      
      document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    document.querySelectorAll('#reasonOptions .radio-item').forEach(function(el) {
      el.addEventListener('click', function() {
        document.querySelectorAll('#reasonOptions .radio-item').forEach(function(item) {
          item.classList.remove('selected');
        });
        this.classList.add('selected');
        document.getElementById('banReason').value = '';
      });
    });

    function loadUsers() {
      const notice = document.getElementById('notice');
      notice.textContent = '正在刷新注册用户数据...';
      fetch('/api/admin/users').then(function(resp) {
        return resp.json();
      }).then(function(result) {
        if (!result.success) {
          notice.textContent = result.message || '获取用户数据失败';
          document.getElementById('userTableBody').innerHTML = '<tr><td class="empty" colspan="9">加载失败，请稍后重试</td></tr>';
          return;
        }
        const data = result.data || {};
        allUsers = Array.isArray(data.users) ? data.users : [];
        notice.textContent = '已加载 ' + (data.total || 0) + ' 个注册用户';
        updateStats(allUsers);
        renderUsers(allUsers);
      }).catch(function(err) {
        notice.textContent = '获取用户数据失败：' + err.message;
        document.getElementById('userTableBody').innerHTML = '<tr><td class="empty" colspan="9">加载失败，请稍后重试</td></tr>';
      });
    }

    document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') applyFilters();
    });
    document.getElementById('userTypeFilter').addEventListener('change', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);
    document.getElementById('syncFilter').addEventListener('change', applyFilters);

    loadUsers();
  </script>
</body>
</html>
