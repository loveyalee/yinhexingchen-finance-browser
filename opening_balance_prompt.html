<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>是否录入期初余额 - 银河星辰</title><style>:root{--nav:#102641;--nav2:#15375d;--gold:#c79833;--blue:#1d64ae;--line:#d9e5f2;--text:#17324b;--muted:#6b7e92}*{box-sizing:border-box}html,body{margin:0;height:100%}body{font:14px "Microsoft YaHei",sans-serif;background:radial-gradient(circle at top right,rgba(29,100,174,.12),transparent 30%),linear-gradient(180deg,#f5f8fc,#eaf1f9);color:var(--text)}.app{min-height:100vh;display:grid;place-items:center;padding:24px}.card{width:min(760px,100%);background:#fff;border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:0 20px 50px rgba(16,39,63,.10)}.eyebrow{display:inline-flex;padding:6px 12px;border-radius:999px;background:#eef5fb;color:#36526d;font-size:12px;font-weight:700}.card h1{margin:14px 0 10px;font-size:30px}.muted{color:var(--muted);line-height:1.8}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.mini{padding:16px;border-radius:18px;background:linear-gradient(180deg,#f8fbfe,#eef4fb);border:1px solid #dde8f3}.mini b{display:block;margin-bottom:8px;font-size:16px}.actions{display:flex;gap:12px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap}.btn{border:none;border-radius:14px;padding:12px 18px;font-weight:700;cursor:pointer}.s{background:#eef4fa;color:#35516d;border:1px solid #dbe7f2}.p{background:linear-gradient(135deg,var(--blue),#0f4d8e);color:#fff}.g{background:linear-gradient(135deg,#c79833,#a9751b);color:#fff}@media(max-width:760px){.grid{grid-template-columns:1fr}.actions{justify-content:stretch}.btn{width:100%}}</style></head><body><div class="app"><div class="card"><span class="eyebrow">新建账套已完成</span><h1>现在是否录入科目期初余额？</h1><div class="muted">按照会计流程，启用新账套后通常需要先录入科目期初余额，再开始凭证处理与日常核算。你可以现在录入，也可以先跳过，稍后在“期初余额”模块继续维护。</div><div class="grid"><div class="mini"><b>建议现在录入</b><div class="muted">适用于从旧账接转、已有上期结转数据、需要立即开始正式做账的场景。</div></div><div class="mini"><b>可以暂时跳过</b><div class="muted">适用于演示账套、测试环境，或暂时只想先浏览系统页面与功能结构。</div></div></div><div class="actions"><button class="btn s" onclick="skipOpeningBalance()">否，稍后再录入</button><button class="btn g" onclick="goOpeningBalance()">是，现在录入</button></div></div></div><script>function goOpeningBalance(){location.href='accounting_v2.html#opening'}function skipOpeningBalance(){location.href='accounting_v2.html'}</script></body></html>
