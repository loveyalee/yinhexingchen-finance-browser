    // 征信打印点查询
    function searchPrintPoints() {
      const province = document.getElementById('province').value;
      const city = document.getElementById('city').value;
      const district = document.getElementById('district').value;
      
      if (!province || !city || !district) {
        alert('请选择省份、城市和区县');
        return;
      }
      
      // 显示加载状态
      const resultsContainer = document.getElementById('results-container');
      resultsContainer.innerHTML = '<div class="loading">正在查询征信打印点数据...</div>';
      
      // 模拟查询延迟
      setTimeout(() => {
        // 根据选择的地区过滤打印点
        let filteredPoints = creditPrintPoints;
        
        if (province) {
          filteredPoints = filteredPoints.filter(point => point.province === province);
        }
        
        if (city) {
          filteredPoints = filteredPoints.filter(point => point.city === city);
        }
        
        if (district) {
          filteredPoints = filteredPoints.filter(point => point.district === district);
        }
        
        if (filteredPoints.length === 0) {
          resultsContainer.innerHTML = '<div class="no-results">未找到符合条件的征信打印点</div>';
        } else {
          resultsContainer.innerHTML = filteredPoints.map(point => `
            <div class="print-point-card" style="border-left-color: ${point.color};">
              <h3>${point.name}</h3>
              <div class="print-point-info"><strong>地址：</strong>${point.address}</div>
              <div class="print-point-info"><strong>电话：</strong>${point.phone}</div>
              <div class="print-point-info"><strong>营业时间：</strong>${point.hours}</div>
              <div class="print-point-info"><strong>类型：</strong>${point.type}</div>
              <div class="print-point-info"><strong>业务范围：</strong>${point.business}</div>
              <div class="print-point-info"><strong>设备：</strong>${point.equipment}</div>
              <div class="print-point-info"><strong>备注：</strong>${point.note}</div>
              <div class="update-time">数据更新时间：${new Date(point.lastUpdated).toLocaleString()}</div>
            </div>
          `).join('');
        }
      }, 500);
    }
  </script>
</body>
</html>
