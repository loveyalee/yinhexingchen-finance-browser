<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台测试 - 银河星辰财务办公智能体</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    .sidebar {
      width: 240px;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      overflow-y: auto;
      max-height: 100vh;
    }
    
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .nav-menu {
      list-style: none;
    }
    
    .nav-item {
      margin-bottom: 10px;
    }
    
    .nav-item a {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s;
    }
    
    .nav-item a:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    .nav-item a.active {
      background-color: #3498db;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      height: 60px;
      background-color: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
    }
    
    .content-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="logo">银河星辰财务办公智能体</div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="#" class="active">人员管理</a></li>
        <li class="nav-item"><a href="#">用户管理</a></li>
        <li class="nav-item"><a href="#">仓库管理</a></li>
        <li class="nav-item"><a href="#">客服管理</a></li>
        <li class="nav-item"><a href="#">投诉管理</a></li>
        <li class="nav-item"><a href="#">内容管理</a></li>
        <li class="nav-item"><a href="#">订单管理</a></li>
        <li class="nav-item"><a href="#">服务器管理</a></li>
      </ul>
    </div>
    
    <div class="main-content">
      <div class="header">
        <h1>管理后台</h1>
        <button class="btn btn-primary">登录</button>
      </div>
      
      <div class="content-area">
        <h2>测试导航菜单点击功能</h2>
        <p>点击左侧导航菜单查看是否有反应</p>
      </div>
    </div>
  </div>
  
  <script>
    console.log('开始执行JavaScript');
    
    // 等待DOM加载完成
    window.onload = function() {
      console.log('DOM加载完成');
      
      // 导航菜单点击事件
      const navItems = document.querySelectorAll('.nav-item a');
      console.log('导航菜单项数量:', navItems.length);
      
      navItems.forEach(item => {
        console.log('绑定点击事件到:', item.textContent.trim());
        item.addEventListener('click', function(e) {
          console.log('点击了:', this.textContent.trim());
          e.preventDefault();
          
          // 移除所有active类
          navItems.forEach(nav => nav.classList.remove('active'));
          // 添加当前active类
          this.classList.add('active');
          
          // 显示对应模块内容
          alert(`您选择了：${this.textContent.trim()}`);
        });
      });
    };
  </script>
</body>
</html>
