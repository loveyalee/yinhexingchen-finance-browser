name: Auto Deploy to Zonya Server

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "db" \
            --exclude ".github" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/

      - name: Install dependencies and restart service
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd ${{ secrets.SERVER_PATH }} && \
            npm install --production && \
            export ALIYUN_SMS_ACCESS_KEY_ID="${{ secrets.ALIYUN_SMS_ACCESS_KEY_ID }}" && \
            export ALIYUN_SMS_ACCESS_KEY_SECRET="${{ secrets.ALIYUN_SMS_ACCESS_KEY_SECRET }}" && \
            export ALIYUN_SMS_SIGN_NAME="${{ secrets.ALIYUN_SMS_SIGN_NAME }}" && \
            export ALIYUN_SMS_TEMPLATE_CODE_REGISTER="${{ secrets.ALIYUN_SMS_TEMPLATE_CODE_REGISTER }}" && \
            export ALIYUN_SMS_TEMPLATE_CODE_RESET_PASSWORD="${{ secrets.ALIYUN_SMS_TEMPLATE_CODE_RESET_PASSWORD }}" && \
            (pm2 describe yinhexingchen > /dev/null 2>&1 && pm2 restart yinhexingchen --update-env || pm2 start server.js --name yinhexingchen) && \
            pm2 save
          '
