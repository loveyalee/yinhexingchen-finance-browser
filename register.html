<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 银河星辰财务专用浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      color: #333;
      display: flex;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }

    /* 左侧品牌区域 */
    .brand-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(56, 139, 253, 0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-20px, 20px) rotate(2deg); }
    }

    .brand-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #388bfd, #8b5cf6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(56, 139, 253, 0.3);
    }

    .brand-logo svg {
      width: 44px;
      height: 44px;
      fill: white;
    }

    .brand-title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      letter-spacing: 2px;
    }

    .brand-subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 50px;
      position: relative;
      z-index: 1;
    }

    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .brand-feature {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
    }

    .brand-feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .brand-feature-icon.blue { background: rgba(56, 139, 253, 0.15); }
    .brand-feature-icon.purple { background: rgba(139, 92, 246, 0.15); }
    .brand-feature-icon.green { background: rgba(45, 164, 78, 0.15); }
    .brand-feature-icon.orange { background: rgba(227, 149, 0, 0.15); }

    /* 右侧注册区域 */
    .register-panel {
      width: 520px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .register-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px 45px;
    }

    .register-header {
      margin-bottom: 32px;
    }

    .register-header h2 {
      color: #1a2332;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .register-header p {
      color: #8b95a1;
      font-size: 14px;
    }

    /* 用户类型选择卡片 */
    .user-type-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .user-type-card {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid #e8ecf0;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }

    .user-type-card:hover {
      border-color: #388bfd;
      background: #f0f7ff;
    }

    .user-type-card.active {
      border-color: #388bfd;
      background: #f0f7ff;
      box-shadow: 0 2px 8px rgba(56, 139, 253, 0.15);
    }

    .user-type-card input[type="radio"] {
      display: none;
    }

    .user-type-card .type-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .user-type-card .type-name {
      font-size: 13px;
      font-weight: 600;
      color: #3a4654;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #3a4654;
      font-size: 13px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #b0b8c4;
      font-size: 16px;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1px solid #e0e4e8;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      background: #f8f9fb;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #388bfd;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.1);
    }

    .input-wrapper select {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1px solid #e0e4e8;
      border-radius: 8px;
      font-size: 14px;
      background: #f8f9fb;
      transition: all 0.2s;
    }

    .input-wrapper select:focus {
      outline: none;
      border-color: #388bfd;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.1);
    }

    .verification-code {
      display: flex;
      gap: 10px;
    }

    .verification-code input {
      flex: 1;
    }

    .verification-code button {
      padding: 0 20px;
      background: linear-gradient(135deg, #388bfd, #5b9ef5);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    .verification-code button:hover {
      box-shadow: 0 4px 12px rgba(56, 139, 253, 0.3);
    }

    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .password-strength .bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: #e0e4e8;
      transition: background 0.3s;
    }

    .password-strength .bar.weak { background: #e74c3c; }
    .password-strength .bar.medium { background: #f39c12; }
    .password-strength .bar.strong { background: #27ae60; }

    .form-actions {
      margin-bottom: 20px;
    }

    .form-actions label {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #8b95a1;
      cursor: pointer;
    }

    .form-actions input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #388bfd;
    }

    .form-actions a {
      color: #388bfd;
      text-decoration: none;
    }

    .form-actions a:hover {
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #388bfd, #5b6ef5);
      color: white;
      letter-spacing: 1px;
    }

    .btn-register:hover {
      box-shadow: 0 4px 16px rgba(56, 139, 253, 0.4);
      transform: translateY(-1px);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .debug-code-banner {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fff7e8;
      border: 1px solid #f2c97d;
      color: #8a5a00;
      font-size: 13px;
      line-height: 1.7;
    }

    .debug-code-banner.show {
      display: block;
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #8b95a1;
    }

    .login-link a {
      color: #388bfd;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #c8ced6;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8ecf0;
    }

    .divider span {
      padding: 0 12px;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #e8ecf0;
      background: #f8f9fb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 20px;
    }

    .social-btn:hover {
      border-color: #388bfd;
      background: #f0f7ff;
    }

    /* 蜻蜓Chat登录区 */
    .chat-login-box {
      background: linear-gradient(135deg, #f0f7ff, #f5f0ff);
      border: 1px solid #e0e8f5;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .chat-login-logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .chat-login-desc {
      color: #7a8fa8;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .chat-login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-login-form input:focus {
      border-color: #388bfd;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.1);
    }

    .btn-chat-login {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #388bfd, #8b5cf6);
      color: white;
    }

    .btn-chat-login:hover {
      box-shadow: 0 4px 12px rgba(56, 139, 253, 0.35);
      transform: translateY(-1px);
    }

    /* 第三方机构字段 */
    #institution-fields {
      background: #f8f9fb;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid #e8ecf0;
    }

    #institution-fields .form-group {
      margin-bottom: 14px;
    }

    #institution-fields .form-group:last-child {
      margin-bottom: 0;
    }

    /* 企业用户字段 */
    #enterprise-fields {
      background: linear-gradient(135deg, #f0f7ff, #f5f0ff);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid #e0e8f5;
      overflow: visible;
    }

    #enterprise-fields .form-group {
      margin-bottom: 14px;
      overflow: visible;
    }

    #enterprise-fields .input-wrapper {
      overflow: visible;
    }

    #enterprise-fields .form-group:last-child {
      margin-bottom: 0;
    }

    /* 企业搜索下拉建议 */
    .suggestions-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 100%;
      width: max-content;
      background: #fff;
      border: 1px solid #e0e4e8;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      max-height: 280px;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 9999;
      margin-top: 2px;
    }

    .suggestion-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
      background: #fff;
      white-space: nowrap;
      min-width: 300px;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.focused {
      background: #f0f7ff;
    }

    .suggestion-item .name {
      font-weight: 600;
      color: #1a2332;
      font-size: 14px;
      line-height: 1.4;
      display: block;
    }

    .suggestion-item .credit-code {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      display: block;
    }

    .suggestion-item .detail-info {
      font-size: 11px;
      color: #aaa;
      margin-top: 3px;
      display: block;
    }

    .suggestion-item .source-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .suggestion-item .source-badge.qcc {
      background: #e6f7ff;
      color: #1890ff;
    }

    .suggestion-item .source-badge.tianyancha {
      background: #fff7e6;
      color: #fa8c16;
    }

    .suggestion-item .source-badge.local {
      background: #f6ffed;
      color: #52c41a;
    }

    .suggestion-loading {
      padding: 20px;
      text-align: center;
      color: #888;
    }

    .suggestion-loading .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e0e4e8;
      border-top-color: #388bfd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .brand-panel { display: none; }
      .register-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- 左侧品牌展示区 -->
  <div class="brand-panel">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="brand-title">银河星辰</div>
    <div class="brand-subtitle">专业财务 · 智慧管理 · 高效协同</div>
    <div class="brand-features">
      <div class="brand-feature">
        <div class="brand-feature-icon blue">&#128179;</div>
        <span>智能凭证录入，自动借贷平衡</span>
      </div>
      <div class="brand-feature">
        <div class="brand-feature-icon purple">&#128200;</div>
        <span>多维度报表分析，实时掌握财务状况</span>
      </div>
      <div class="brand-feature">
        <div class="brand-feature-icon green">&#128274;</div>
        <span>银行级数据加密，安全可靠</span>
      </div>
      <div class="brand-feature">
        <div class="brand-feature-icon orange">&#127891;</div>
        <span>专业财税知识库，持续学习成长</span>
      </div>
    </div>
  </div>

  <!-- 右侧注册表单 -->
  <div class="register-panel">
    <div class="register-inner">
      <div class="register-header">
        <h2>创建账户</h2>
        <p>注册后即可体验全部专业财务功能</p>
      </div>

      <!-- 用户类型卡片选择 -->
      <div class="user-type-cards">
        <div class="user-type-card active" onclick="selectUserType(this, 'personal')">
          <input type="radio" name="user-type" value="personal" checked>
          <div class="type-icon">&#128100;</div>
          <div class="type-name">个人用户</div>
        </div>
        <div class="user-type-card" onclick="selectUserType(this, 'enterprise')">
          <input type="radio" name="user-type" value="enterprise">
          <div class="type-icon">&#127970;</div>
          <div class="type-name">企业用户</div>
        </div>
        <div class="user-type-card" onclick="selectUserType(this, 'institution')">
          <input type="radio" name="user-type" value="institution">
          <div class="type-icon">&#127963;</div>
          <div class="type-name">第三方机构</div>
        </div>
      </div>

      <form id="register-form" novalidate>
        <!-- 企业用户注册字段（放在前面） -->
        <div id="enterprise-fields" style="display: none;">
          <div class="form-group">
            <label for="enterprise-username">用户名</label>
            <div class="input-wrapper">
              <span class="input-icon">&#128100;</span>
              <input type="text" id="enterprise-username" placeholder="请输入用户名（用于登录和显示）">
            </div>
          </div>

          <div class="form-group">
            <label for="enterprise-name">企业名称</label>
            <div class="input-wrapper" style="position:relative;">
              <span class="input-icon">&#127970;</span>
              <input type="text" id="enterprise-name" placeholder="请输入企业名称（支持智能搜索）" autocomplete="off">
              <div id="enterprise-suggestions" class="suggestions-dropdown" style="display:none;"></div>
            </div>
            <div id="enterprise-search-status" style="font-size:12px;color:#888;margin-top:4px;"></div>
          </div>

          <div class="form-group">
            <label for="enterprise-credit-code">统一社会信用代码</label>
            <div class="input-wrapper">
              <span class="input-icon">&#128196;</span>
              <input type="text" id="enterprise-credit-code" placeholder="选择企业后自动生成" readonly style="background:#f8f9fb;">
            </div>
            <div style="font-size:12px;color:#888;margin-top:4px;">选择企业后自动填充</div>
          </div>

          <div class="form-group">
            <label for="enterprise-industry">行业类型</label>
            <div class="input-wrapper">
              <span class="input-icon">🏢</span>
              <select id="enterprise-industry">
                <option value="">请选择行业类型</option>
                <option value="it">信息技术</option>
                <option value="finance">金融</option>
                <option value="education">教育</option>
                <option value="healthcare">医疗健康</option>
                <option value="retail">零售</option>
                <option value="manufacturing">制造业</option>
                <option value="service">服务业</option>
                <option value="other">其他</option>
              </select>
            </div>
          </div>

          <input type="hidden" id="enterprise-selected-data" value="">
        </div>

        <!-- 个人用户字段：用户名 -->
        <div class="form-group" id="username-field">
          <label for="username">用户名</label>
          <div class="input-wrapper">
            <span class="input-icon">&#128100;</span>
            <input type="text" id="username" placeholder="请输入用户名（用于登录和显示）" required>
          </div>
        </div>

        <div class="form-group">
          <label for="phone">手机号</label>
          <div class="input-wrapper">
            <span class="input-icon">&#128241;</span>
            <input type="tel" id="phone" placeholder="请输入手机号码" required>
          </div>
        </div>

        <div class="form-group">
          <label for="verification-code">验证码</label>
          <div class="verification-code">
            <div class="input-wrapper" style="flex:1;">
              <span class="input-icon">&#128274;</span>
              <input type="text" id="verification-code" placeholder="请输入验证码" required>
            </div>
            <button type="button" id="send-code-btn" onclick="sendVerificationCode()">获取验证码</button>
          </div>
          <div id="register-debug-code" class="debug-code-banner"></div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="input-wrapper">
            <span class="input-icon">&#128272;</span>
            <input type="password" id="password" placeholder="请设置密码（至少6位）" required oninput="checkPasswordStrength()">
          </div>
          <div class="password-strength" id="password-strength">
            <div class="bar" id="str-bar-1"></div>
            <div class="bar" id="str-bar-2"></div>
            <div class="bar" id="str-bar-3"></div>
            <div class="bar" id="str-bar-4"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">确认密码</label>
          <div class="input-wrapper">
            <span class="input-icon">&#128272;</span>
            <input type="password" id="confirm-password" placeholder="请再次输入密码" required>
          </div>
        </div>

        <!-- 第三方机构注册字段 -->
        <div id="institution-fields" style="display: none;">
          <div class="form-group">
            <label>机构类型</label>
            <div class="input-wrapper">
              <span class="input-icon">&#127963;</span>
              <select id="institution-type">
                <option value="">请选择机构类型</option>
                <option value="accounting">会计师事务所</option>
                <option value="lawyer">律师事务所</option>
                <option value="valuation">资产评估机构</option>
                <option value="trademark">商标专利代理机构</option>
                <option value="tech">高新科小代理机构</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="institution-name">机构名称</label>
            <div class="input-wrapper">
              <span class="input-icon">&#127970;</span>
              <input type="text" id="institution-name" placeholder="请输入机构名称">
            </div>
          </div>

          <div class="form-group">
            <label for="credit-code">统一社会信用代码</label>
            <div class="input-wrapper">
              <span class="input-icon">&#128196;</span>
              <input type="text" id="credit-code" placeholder="请输入统一社会信用代码">
            </div>
          </div>

          <div class="form-group">
            <label for="contact-person">联系人</label>
            <div class="input-wrapper">
              <span class="input-icon">&#128100;</span>
              <input type="text" id="contact-person" placeholder="请输入联系人姓名">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <label>
            <input type="checkbox" id="agree-terms"> 我已阅读并同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
          </label>
          <label style="margin-top:10px;display:flex;align-items:center;">
            <input type="checkbox" id="sync-chat-account" style="margin-right:8px;"> 同步注册蜻蜓Chat账号（账号为纯数字）
          </label>
        </div>

        <button type="submit" class="btn-register">注 册</button>
      </form>

      <div id="chat-login-section">
        <div class="divider"><span>蜻蜓Chat 登录</span></div>

        <div class="chat-login-box">
          <div class="chat-login-logo">&#129412;</div>
          <p class="chat-login-desc">使用蜻蜓Chat账号快捷登录</p>
          <div class="chat-login-form">
            <input type="text" id="chat-username" placeholder="蜻蜓Chat用户名" style="width:100%;padding:11px 14px;border:1px solid #e0e4e8;border-radius:8px;font-size:14px;background:#f8f9fb;outline:none;transition:all 0.2s;">
            <input type="password" id="chat-password" placeholder="密码" style="width:100%;padding:11px 14px;border:1px solid #e0e4e8;border-radius:8px;font-size:14px;background:#f8f9fb;outline:none;transition:all 0.2s;">
            <button type="button" class="btn-chat-login" onclick="chatLogin()">登录蜻蜓Chat</button>
          </div>
        </div>
      </div>

      <div class="login-link">
        已有账户？<a href="login.html">立即登录</a>
      </div>
    </div>
  </div>

  <script>
    // 企业搜索相关变量
    var enterpriseSearchTimer = null;
    var selectedEnterprise = null;

    function selectUserType(el, type) {
      document.querySelectorAll('.user-type-card').forEach(function(card) {
        card.classList.remove('active');
      });
      el.classList.add('active');
      el.querySelector('input[type="radio"]').checked = true;

      var institutionFields = document.getElementById('institution-fields');
      var enterpriseFields = document.getElementById('enterprise-fields');
      institutionFields.style.display = type === 'institution' ? 'block' : 'none';
      enterpriseFields.style.display = type === 'enterprise' ? 'block' : 'none';

      // 用户名输入框：个人用户必填，企业用户隐藏，第三方机构隐藏
      var usernameField = document.getElementById('username-field');
      var usernameInput = document.getElementById('username');
      if (type === 'personal') {
        usernameField.style.display = 'block';
        usernameInput.required = true;
        usernameInput.placeholder = '请输入用户名（用于登录和显示）';
      } else {
        usernameField.style.display = 'none';
        usernameInput.required = false;
      }

      // 蜻蜓Chat登录区域：个人用户隐藏，其他用户类型显示
      var chatLoginSection = document.getElementById('chat-login-section');
      if (chatLoginSection) {
        chatLoginSection.style.display = type === 'personal' ? 'none' : 'block';
      }
    }

    // 企业名称智能搜索
    function initEnterpriseSearch() {
      var enterpriseNameInput = document.getElementById('enterprise-name');
      var suggestionsDiv = document.getElementById('enterprise-suggestions');
      var statusDiv = document.getElementById('enterprise-search-status');

      enterpriseNameInput.addEventListener('input', function() {
        var keyword = this.value.trim();

        // 清除之前的定时器
        if (enterpriseSearchTimer) {
          clearTimeout(enterpriseSearchTimer);
        }

        // 重置选中的企业
        selectedEnterprise = null;
        document.getElementById('enterprise-selected-data').value = '';
        document.getElementById('enterprise-credit-code').value = '';

        if (keyword.length < 2) {
          suggestionsDiv.style.display = 'none';
          statusDiv.textContent = keyword.length === 1 ? '请继续输入企业名称（至少2个字）' : '';
          statusDiv.style.color = '#aaa';
          return;
        }

        statusDiv.textContent = '正在搜索...';
        statusDiv.style.color = '#388bfd';

        // 延迟搜索，避免频繁请求
        enterpriseSearchTimer = setTimeout(function() {
          searchEnterprise(keyword);
        }, 400);
      });

      // 键盘上下键导航下拉列表
      enterpriseNameInput.addEventListener('keydown', function(e) {
        var items = suggestionsDiv.querySelectorAll('.suggestion-item');
        if (!items.length || suggestionsDiv.style.display === 'none') return;
        var focused = suggestionsDiv.querySelector('.suggestion-item.focused');
        var idx = focused ? Array.prototype.indexOf.call(items, focused) : -1;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (focused) focused.classList.remove('focused');
          idx = (idx + 1) % items.length;
          items[idx].classList.add('focused');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (focused) focused.classList.remove('focused');
          idx = (idx - 1 + items.length) % items.length;
          items[idx].classList.add('focused');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter' && focused) {
          e.preventDefault();
          focused.click();
        } else if (e.key === 'Escape') {
          suggestionsDiv.style.display = 'none';
        }
      });

      // 点击其他地方关闭下拉
      document.addEventListener('click', function(e) {
        if (!enterpriseNameInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
          suggestionsDiv.style.display = 'none';
        }
      });
    }

    // 搜索企业
    function searchEnterprise(keyword) {
      var suggestionsDiv = document.getElementById('enterprise-suggestions');
      var statusDiv = document.getElementById('enterprise-search-status');

      // 显示加载状态
      suggestionsDiv.innerHTML = '<div class="suggestion-loading"><span class="loading-spinner"></span>正在搜索企业信息...</div>';
      suggestionsDiv.style.display = 'block';
      statusDiv.textContent = '正在从企业数据库查询...';
      statusDiv.style.color = '#388bfd';

      // 调用后端API搜索企业
      fetch('/api/enterprise/search?keyword=' + encodeURIComponent(keyword))
        .then(function(resp) { return resp.json(); })
        .then(function(result) {
          if (result.success && result.data && result.data.length > 0) {
            var sourceText = result.source === 'external' ? '（来自外部企业数据库）' : '';
            statusDiv.textContent = '找到 ' + result.data.length + ' 个相关企业' + sourceText;
            statusDiv.style.color = '#27ae60';
            renderEnterpriseSuggestions(result.data, result.source);
          } else {
            statusDiv.textContent = '未找到相关企业，请检查企业名称';
            statusDiv.style.color = '#e74c3c';
            suggestionsDiv.style.display = 'none';
          }
        })
        .catch(function(err) {
          statusDiv.textContent = '搜索失败：' + err.message;
          statusDiv.style.color = '#e74c3c';
          suggestionsDiv.style.display = 'none';
        });
    }

    // 渲染企业搜索建议
    function renderEnterpriseSuggestions(enterprises, source) {
      var suggestionsDiv = document.getElementById('enterprise-suggestions');
      var html = '';

      enterprises.forEach(function(ent, index) {
        var sourceBadge = '';
        if (ent.source === 'qcc') {
          sourceBadge = '<span class="source-badge qcc">企查查</span>';
        } else if (ent.source === 'tianyancha') {
          sourceBadge = '<span class="source-badge tianyancha">天眼查</span>';
        } else if (source === 'local') {
          sourceBadge = '<span class="source-badge local">本地</span>';
        }

        var detailInfo = '';
        if (ent.legalPerson) {
          detailInfo += '法人：' + ent.legalPerson;
        }
        if (ent.regCapital) {
          detailInfo += (detailInfo ? ' | ' : '') + '注册资本：' + ent.regCapital;
        }
        if (ent.status) {
          detailInfo += (detailInfo ? ' | ' : '') + '状态：' + ent.status;
        }

        html += '<div class="suggestion-item" onclick="selectEnterprise(' + index + ')" data-index="' + index + '">' +
          '<div class="name">' + ent.name + sourceBadge + '</div>' +
          '<div class="credit-code">统一社会信用代码：' + ent.creditCode + '</div>' +
          (detailInfo ? '<div class="detail-info">' + detailInfo + '</div>' : '') +
          '</div>';
      });

      suggestionsDiv.innerHTML = html;
      suggestionsDiv.style.display = 'block';

      // 存储企业数据供选择使用
      window.enterpriseSearchResults = enterprises;
    }

    // 选择企业
    function selectEnterprise(index) {
      var enterprise = window.enterpriseSearchResults[index];
      if (!enterprise) return;

      selectedEnterprise = enterprise;

      // 填充表单
      document.getElementById('enterprise-name').value = enterprise.name;
      document.getElementById('enterprise-credit-code').value = enterprise.creditCode;
      document.getElementById('enterprise-selected-data').value = JSON.stringify(enterprise);

      // 隐藏下拉
      document.getElementById('enterprise-suggestions').style.display = 'none';

      var statusDiv = document.getElementById('enterprise-search-status');
      statusDiv.textContent = '已选择：' + enterprise.name;
      statusDiv.style.color = '#27ae60';
    }

    function checkPasswordStrength() {
      var pwd = document.getElementById('password').value;
      var strength = 0;
      if (pwd.length >= 6) strength++;
      if (pwd.length >= 10) strength++;
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) strength++;
      if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) strength++;

      for (var i = 1; i <= 4; i++) {
        var bar = document.getElementById('str-bar-' + i);
        bar.className = 'bar';
        if (i <= strength) {
          if (strength <= 1) bar.classList.add('weak');
          else if (strength <= 2) bar.classList.add('medium');
          else bar.classList.add('strong');
        }
      }
    }

    function sendVerificationCode() {
      var phone = document.getElementById('phone').value;
      if (!phone) {
        alert('请输入手机号');
        return;
      }
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入正确的手机号码');
        return;
      }
      var btn = document.getElementById('send-code-btn');
      btn.disabled = true;
      btn.textContent = '发送中...';

      fetch('/api/sms/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phone, purpose: 'register' })
      }).then(function(resp) {
        return resp.json();
      }).then(function(result) {
        if (!result.success) {
          alert(result.message || '验证码发送失败');
          btn.disabled = false;
          btn.textContent = '获取验证码';
          return;
        }
        btn.style.opacity = '0.6';
        var countdown = 60;
        btn.textContent = '验证码已发送 ' + countdown + 's';
        var timer = setInterval(function() {
          countdown--;
          btn.textContent = '验证码已发送 ' + countdown + 's';
          if (countdown <= 0) {
            clearInterval(timer);
            btn.textContent = '获取验证码';
            btn.disabled = false;
            btn.style.opacity = '1';
          }
        }, 1000);
        // 显示测试验证码（不弹窗）
        var debugBanner = document.getElementById('register-debug-code');
        if (debugBanner) {
          if (result.mode === 'debug' && result.debugCode) {
            debugBanner.textContent = '验证码已发送，测试模式验证码：' + result.debugCode;
            debugBanner.classList.add('show');
          } else {
            debugBanner.textContent = '验证码已发送到您的手机';
            debugBanner.classList.add('show');
          }
        }
      }).catch(function(err) {
        alert('验证码发送失败：' + err.message);
        btn.disabled = false;
        btn.textContent = '获取验证码';
      });
    }

    function chatLogin() {
      var username = document.getElementById('chat-username').value;
      var password = document.getElementById('chat-password').value;
      if (!username || !password) {
        alert('请输入蜻蜓Chat用户名和密码');
        return;
      }
      alert('蜻蜓Chat登录成功！正在同步账户信息...');
      // 自动填充手机号
      if (!document.getElementById('phone').value) {
        document.getElementById('phone').value = username;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      // 初始化企业搜索功能
      initEnterpriseSearch();

      // 初始化蜻蜓Chat登录区域显示状态（个人用户默认隐藏）
      var chatLoginSection = document.getElementById('chat-login-section');
      if (chatLoginSection) {
        chatLoginSection.style.display = 'none';
      }

      var registerForm = document.getElementById('register-form');

      registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        console.log('注册表单提交');

        var username = document.getElementById('username').value;
        var phone = document.getElementById('phone').value;
        var verificationCode = document.getElementById('verification-code').value;
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirm-password').value;
        var userType = document.querySelector('input[name="user-type"]:checked').value;

        console.log('用户类型:', userType, '手机号:', phone);

        // 个人用户必须填写用户名
        if (userType === 'personal' && !username) {
          alert('请输入用户名');
          return;
        }

        // 企业用户必须选择企业
        if (userType === 'enterprise') {
          if (!selectedEnterprise) {
            alert('请通过智能搜索选择企业');
            return;
          }
        }

        if (!phone || !verificationCode || !password || !confirmPassword) {
          alert('请填写所有必填字段');
          return;
        }

        // 检查是否勾选协议
        if (!document.getElementById('agree-terms').checked) {
          alert('请阅读并同意《用户协议》和《隐私政策》');
          return;
        }

        if (password !== confirmPassword) {
          alert('两次输入的密码不一致');
          return;
        }

        if (userType === 'institution') {
          var institutionType = document.getElementById('institution-type').value;
          var institutionName = document.getElementById('institution-name').value;
          var creditCode = document.getElementById('credit-code').value;
          var contactPerson = document.getElementById('contact-person').value;

          if (!institutionType || !institutionName || !creditCode || !contactPerson) {
            alert('请填写所有机构信息');
            return;
          }
        }

        // 构建请求数据
        var requestData = {
          username: username || phone, // 用户名默认为手机号
          phone: phone,
          password: password,
          userType: userType,
          syncChatAccount: document.getElementById('sync-chat-account').checked // 是否同步注册蜻蜓Chat
        };

        console.log('请求数据:', requestData);

        // 企业用户额外数据
        if (userType === 'enterprise' && selectedEnterprise) {
          var enterpriseUsername = document.getElementById('enterprise-username').value.trim();
          if (!enterpriseUsername) {
            alert('请输入用户名');
            return;
          }
          requestData.username = enterpriseUsername;
          requestData.enterpriseName = selectedEnterprise.name;
          requestData.creditCode = selectedEnterprise.creditCode;
          requestData.legalPerson = selectedEnterprise.legalPerson || '';
          requestData.address = selectedEnterprise.address || '';
          requestData.industry = document.getElementById('enterprise-industry').value;
        }

        // 第三方机构额外数据
        if (userType === 'institution') {
          requestData.institutionType = document.getElementById('institution-type').value;
          requestData.institutionName = document.getElementById('institution-name').value;
          requestData.creditCode = document.getElementById('credit-code').value;
          requestData.contactPerson = document.getElementById('contact-person').value;
        }

        // 显示加载状态
        var submitBtn = document.querySelector('.btn-register');
        var originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';

        fetch('/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestData)
        }).then(function(resp) {
          return resp.json();
        }).then(function(result) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          if (!result.success) {
            alert(result.message || '注册失败');
            return;
          }
          var successMessage = '注册成功！系统已自动为您建立本地数据库，并完成云端备份。';
          if (userType === 'enterprise') {
            successMessage = '注册成功！企业账户已创建，企业名称：' + selectedEnterprise.name;
          } else if (userType === 'institution') {
            var sel = document.getElementById('institution-type');
            successMessage = '注册成功！' + sel.options[sel.selectedIndex].text + '账户已创建，并已自动建立本地数据库及云端备份。';
          }
          // 显示蜻蜓Chat账号信息
          if (result.data && result.data.chatAccount) {
            successMessage += '\n\n蜻蜓Chat账号已同步创建！\n账号：' + result.data.chatAccount.chatId + '\n请使用此账号登录蜻蜓Chat。';
          }
          alert(successMessage);
          window.location.href = 'login.html';
        }).catch(function(err) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          alert('注册失败：' + err.message);
        });
      });
    });
  </script>
