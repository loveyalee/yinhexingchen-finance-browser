<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客服登录 - 银河星辰财务浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 400px;
      max-width: 90%;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      color: #2c3e50;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .logo p {
      color: #7f8c8d;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: bold;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
    
    .error-message {
      color: #e74c3c;
      text-align: center;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🎧 客服工作台</h1>
      <p>银河星辰财务浏览器 - 客服专用</p>
    </div>
    
    <div class="error-message" id="errorMsg"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="csId">客服工号</label>
        <input type="text" id="csId" name="csId" placeholder="请输入您的工号" required>
      </div>
      
      <div class="form-group">
        <label for="password">登录密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>
      </div>
      
      <button type="submit" class="btn btn-primary">登录工作台</button>
    </form>
    
    <div class="back-link">
      <a href="login.html">← 返回用户登录</a>
    </div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const csId = document.getElementById('csId').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // 模拟登录验证
      if (!csId || !password) {
        errorMsg.textContent = '请填写工号和密码';
        errorMsg.style.display = 'block';
        return;
      }
      
      // 模拟客服账号验证（实际应该调用后端API）
      const validAccounts = [
        { id: 'CS001', name: '张小明', password: '123456' },
        { id: 'CS002', name: '李小红', password: '123456' },
        { id: 'CS003', name: '王小华', password: '123456' }
      ];
      
      const account = validAccounts.find(acc => acc.id === csId && acc.password === password);
      
      if (account) {
        // 保存登录状态
        localStorage.setItem('csAdminLoggedIn', 'true');
        localStorage.setItem('csId', account.id);
        localStorage.setItem('csName', account.name);
        localStorage.setItem('csStatus', 'online');
        
        // 跳转到客服工作台
        window.location.href = 'cs_admin_dashboard.html';
      } else {
        errorMsg.textContent = '工号或密码错误';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
